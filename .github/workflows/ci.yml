name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pytest -q

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm test
      - run: npm run check
      - name: webroot copy matches the shared source
        run: |
          npm run sync:shared
          diff shared/game-math.js app/www/game-math.js

  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - run: npm ci
      - run: npm run test:rules
