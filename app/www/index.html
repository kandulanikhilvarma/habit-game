<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0d1022">
  <title>Kumo</title>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <span class="chip chip--level" id="level"></span>
      <span class="chip chip--streak" id="streak"></span>
    </header>

    <div class="xp" role="progressbar" aria-label="Level progress">
      <div class="xp__fill" id="xp-fill"></div>
    </div>

    <button class="signin-banner" id="home-signin" hidden>
      <span>Playing as guest — sign in to save your creature</span>
      <span class="signin-banner__cta">Sign in</span>
    </button>

    <section class="screen" id="screen-home" data-screen="home">
      <div class="scene">
        <div class="glade"></div>
        <div class="creature-stage" id="creature"></div>
        <h1 class="creature-name" id="creature-name"></h1>
        <p class="creature-stage-tag" id="creature-stage-tag"></p>
      </div>

      <div class="today">
        <span class="today__label" id="today-label"></span>
        <span class="today__dots" id="today-dots"></span>
      </div>

      <ul class="quests" id="quests"></ul>
      <button class="add-quest" id="add-quest">
        <span class="add-quest__plus" aria-hidden="true"></span>
        <span>Add a quest</span>
      </button>
    </section>

    <section class="screen" id="screen-journey" data-screen="journey" hidden></section>
    <section class="screen" id="screen-you" data-screen="you" hidden></section>

    <nav class="tabs" role="tablist">
      <button class="tab" role="tab" aria-selected="true" data-screen="home" data-icon="home" data-label="Home"></button>
      <button class="tab" role="tab" aria-selected="false" data-screen="journey" data-icon="chart" data-label="Journey"></button>
      <button class="tab" role="tab" aria-selected="false" data-screen="you" data-icon="user" data-label="You"></button>
    </nav>
  </main>

  <div class="overlay" id="overlay"></div>

  <div class="scrim" id="scrim" hidden></div>
  <section class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="New habit quest" hidden></section>

  <script type="module" src="app.js"></script>
</body>
</html>
